// ── State ─────────────────────────────────────────────────────────────────────
const STORE_KEY = "wc26_tracker_v1";
let state = {
  user: null,
  tab: "upcoming",
  predictions: {},  // matchId -> { luis: {scoreA, scoreB, draw, penalty, locked}, bibi: {...} }
  results: {},      // matchId -> { scoreA, scoreB, winner, draw, penalty, entered }
};
// Per-card UI drafts (not persisted)
let drafts = {};      // matchId -> prediction draft
let resultDrafts = {}; // matchId -> result draft
let resultOpen = {};   // matchId -> bool

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.predictions = saved.predictions || {};
      state.results = saved.results || {};
      state.user = saved.user || null;
    }
  } catch (e) { console.error("load failed", e); }
}

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      predictions: state.predictions,
      results: state.results,
      user: state.user,
    }));
    return true;
  } catch (e) {
    alert("⚠️ Save failed — your browser may be blocking storage (private mode?)");
    return false;
  }
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcPoints(pred, result) {
  if (!pred || !pred.locked || !result || !result.entered) return null;
  let pts = 0;
  if (String(pred.scoreA) === String(result.scoreA)) pts += SCORING.scoreA;
  if (String(pred.scoreB) === String(result.scoreB)) pts += SCORING.scoreB;
  if (result.draw === "Y") {
    if (pred.draw === "Y") pts += SCORING.draw;
  } else {
    const predWinner = Number(pred.scoreA) > Number(pred.scoreB) ? "A" : "B";
    if (predWinner === result.winner) pts += SCORING.winner;
  }
  if (pred.penalty === result.penalty) pts += SCORING.penalty;
  return pts;
}

function totals() {
  let luis = 0, bibi = 0;
  GROUP_MATCHES.forEach(m => {
    const lp = calcPoints((state.predictions[m.id]||{}).luis, state.results[m.id]);
    const bp = calcPoints((state.predictions[m.id]||{}).bibi, state.results[m.id]);
    if (lp !== null) luis += lp;
    if (bp !== null) bibi += bp;
  });
  return { luis, bibi };
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function flag(team) { return FLAGS[team] || "🏳️"; }
function ptsClass(p) { return p >= 40 ? "high" : p >= 20 ? "mid" : ""; }

// ── Actions (global, called from onclick) ─────────────────────────────────────
window.selectUser = function(name) { state.user = name; saveState(); render(); };
window.switchUser = function() { state.user = null; saveState(); render(); };
window.setTab = function(t) { state.tab = t; render(); };

window.updateDraft = function(id, field, value) {
  drafts[id] = drafts[id] || { scoreA:"", scoreB:"", draw:"", penalty:"" };
  drafts[id][field] = value;
  render();
};
window.lockPrediction = function(id) {
  const d = drafts[id];
  if (!d || d.scoreA === "" || d.scoreB === "") return;
  if (!confirm("Lock this prediction? It can't be changed after.")) return;
  const userKey = state.user.toLowerCase();
  state.predictions[id] = state.predictions[id] || {};
  state.predictions[id][userKey] = { ...d, locked: true };
  if (saveState()) delete drafts[id];
  render();
};
window.toggleResultForm = function(id) { resultOpen[id] = !resultOpen[id]; render(); };
window.updateResultDraft = function(id, field, value) {
  resultDrafts[id] = resultDrafts[id] || { scoreA:"", scoreB:"", penalty:"" };
  resultDrafts[id][field] = value;
  render();
};
window.submitResult = function(id) {
  const d = resultDrafts[id];
  if (!d || d.scoreA === "" || d.scoreB === "") return;
  if (!confirm("Confirm final result? This scores the match.")) return;
  const draw = String(d.scoreA) === String(d.scoreB) ? "Y" : "N";
  const winner = draw === "Y" ? "" : (Number(d.scoreA) > Number(d.scoreB) ? "A" : "B");
  state.results[id] = { scoreA: d.scoreA, scoreB: d.scoreB, penalty: d.penalty || "N", draw, winner, entered: true };
  if (saveState()) { delete resultDrafts[id]; delete resultOpen[id]; }
  render();
};
window.exportData = function() {
  const data = JSON.stringify({ predictions: state.predictions, results: state.results }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wc26_tracker_backup.json";
  a.click();
};
window.importData = function() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!confirm("Import this data? It will MERGE with existing data (imported entries win conflicts).")) return;
        // Merge: imported locked predictions and results take precedence
        Object.keys(data.predictions || {}).forEach(id => {
          state.predictions[id] = state.predictions[id] || {};
          ["luis","bibi"].forEach(k => {
            if (data.predictions[id][k] && data.predictions[id][k].locked) {
              state.predictions[id][k] = data.predictions[id][k];
            }
          });
        });
        Object.keys(data.results || {}).forEach(id => {
          if (data.results[id] && data.results[id].entered) state.results[id] = data.results[id];
        });
        saveState();
        render();
        alert("✓ Imported successfully");
      } catch (err) { alert("Import failed: invalid file"); }
    };
    reader.readAsText(file);
  };
  input.click();
};

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!state.user) { app.innerHTML = renderUserSelect(); return; }

  const t = totals();
  const upcoming = GROUP_MATCHES.filter(m => !(state.results[m.id]||{}).entered);
  const completed = GROUP_MATCHES.filter(m => (state.results[m.id]||{}).entered);

  let bodyHtml = "";
  if (state.tab === "upcoming") {
    bodyHtml = upcoming.length === 0
      ? '<div class="empty-state">All group matches completed! 🏆</div>'
      : upcoming.map(renderCard).join("");
  } else if (state.tab === "completed") {
    bodyHtml = completed.length === 0
      ? '<div class="empty-state">No completed matches yet.</div>'
      : completed.map(renderCard).join("");
  } else {
    bodyHtml = renderStandings(t, completed.length);
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="header-title">⚽ WC 2026</div>
          <div class="header-sub">Playing as <strong>${esc(state.user)}</strong> · <a onclick="switchUser()">Switch</a></div>
        </div>
        <div class="score-badge">
          <div class="label">STANDINGS</div>
          <div>Luis <strong>${t.luis}</strong> &nbsp;·&nbsp; Bibi <strong>${t.bibi}</strong></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab ${state.tab==='upcoming'?'active':''}" onclick="setTab('upcoming')">Upcoming (${upcoming.length})</button>
        <button class="tab ${state.tab==='completed'?'active':''}" onclick="setTab('completed')">Completed (${completed.length})</button>
        <button class="tab ${state.tab==='standings'?'active':''}" onclick="setTab('standings')">Standings</button>
      </div>
    </div>
    <div class="body">${bodyHtml}
      <div class="data-tools">
        <button onclick="exportData()">⬇ Export backup</button>
        <button onclick="importData()">⬆ Import / merge</button>
      </div>
    </div>
  `;
}

function renderUserSelect() {
  return `
    <div class="user-select">
      <div class="us-emoji">⚽</div>
      <div class="us-title">WC 2026 Tracker</div>
      <div class="us-sub">Who are you?</div>
      <button class="us-btn" onclick="selectUser('Luis')">Luis</button>
      <button class="us-btn" onclick="selectUser('Bibi')">Bibi</button>
      <div class="us-note">Data is stored on this device. Use Export/Import to sync between phones.</div>
    </div>
  `;
}

function renderCard(m) {
  const userKey = state.user.toLowerCase();
  const otherKey = userKey === "luis" ? "bibi" : "luis";
  const otherName = userKey === "luis" ? "Bibi" : "Luis";
  const pred = state.predictions[m.id] || {};
  const myPred = pred[userKey] || {};
  const otherPred = pred[otherKey] || {};
  const result = state.results[m.id] || {};
  const isLocked = !!myPred.locked;
  const hasResult = !!result.entered;
  const d = drafts[m.id] || { scoreA:"", scoreB:"", draw:"", penalty:"" };
  const rd = resultDrafts[m.id] || { scoreA:"", scoreB:"", penalty:"" };

  const luisPts = calcPoints(pred.luis, result);
  const bibiPts = calcPoints(pred.bibi, result);
  const myPts = userKey === "luis" ? luisPts : bibiPts;

  let predHtml = "";
  if (!isLocked) {
    predHtml = `
      <div class="form-area">
        <div class="form-label">Your Prediction</div>
        <div class="score-row">
          <input class="score-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(d.scoreA)}"
            oninput="updateDraft(${m.id},'scoreA',this.value)">
          <div class="score-label">${esc(m.teamA)}<br><span style="opacity:0.5">vs</span><br>${esc(m.teamB)}</div>
          <input class="score-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(d.scoreB)}"
            oninput="updateDraft(${m.id},'scoreB',this.value)">
        </div>
        <div class="toggle-row">
          <button class="toggle-btn ${d.draw==='Y'?'active-blue':''}" onclick="updateDraft(${m.id},'draw','Y')">✓ Draw</button>
          <button class="toggle-btn ${d.draw==='N'?'active-blue':''}" onclick="updateDraft(${m.id},'draw','N')">✗ Draw</button>
        </div>
        <div class="toggle-row">
          <button class="toggle-btn ${d.penalty==='Y'?'active-purple':''}" onclick="updateDraft(${m.id},'penalty','Y')">✓ Penalty</button>
          <button class="toggle-btn ${d.penalty==='N'?'active-purple':''}" onclick="updateDraft(${m.id},'penalty','N')">✗ Penalty</button>
        </div>
        <button class="lock-btn" onclick="lockPrediction(${m.id})" ${d.scoreA===""||d.scoreB===""?"disabled":""}>🔒 Lock Prediction</button>
      </div>
    `;
  } else {
    predHtml = `
      <div class="locked-badge">🔒 Locked</div>
      <div class="pred-summary">
        <span class="pred-score">${esc(myPred.scoreA)}</span>
        <span style="color:rgba(255,255,255,0.3)">–</span>
        <span class="pred-score">${esc(myPred.scoreB)}</span>
        <span class="pred-extras">${myPred.draw==='Y'?'· Draw ✓':'· No Draw'} &nbsp; ${myPred.penalty==='Y'?'· Pen ✓':'· No Pen'}</span>
      </div>
      ${hasResult && myPts !== null ? `<div style="text-align:center;padding-bottom:10px"><span class="pts-badge ${ptsClass(myPts)}">${myPts} pts</span></div>` : ""}
    `;
  }

  // Other player's prediction visibility: only show if locked AND (you've locked too OR result entered)
  let otherHtml = "";
  if (otherPred.locked) {
    if (isLocked || hasResult) {
      otherHtml = `<div class="other-pred">${otherName}: ${esc(otherPred.scoreA)}–${esc(otherPred.scoreB)} ${otherPred.draw==='Y'?'· Draw':''} ${otherPred.penalty==='Y'?'· Pen':''}</div>`;
    } else {
      otherHtml = `<div class="other-pred">${otherName} has locked 🔒 (hidden until you lock)</div>`;
    }
  }

  let resultHtml = "";
  if (!hasResult) {
    resultHtml = `
      <div class="result-section">
        <div class="result-header">
          <div class="result-label">Actual Result</div>
          <button class="result-toggle-btn ${resultOpen[m.id]?'open':''}" onclick="toggleResultForm(${m.id})">${resultOpen[m.id]?'Cancel':'Enter Result'}</button>
        </div>
        ${resultOpen[m.id] ? `
          <div class="result-form">
            <div class="score-row">
              <input class="result-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(rd.scoreA)}"
                oninput="updateResultDraft(${m.id},'scoreA',this.value)">
              <div class="score-label" style="color:#2ecc71">${esc(m.teamA)} vs ${esc(m.teamB)}</div>
              <input class="result-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(rd.scoreB)}"
                oninput="updateResultDraft(${m.id},'scoreB',this.value)">
            </div>
            <div class="toggle-row">
              <button class="toggle-btn ${rd.penalty==='Y'?'active-green':''}" onclick="updateResultDraft(${m.id},'penalty','Y')">✓ Penalty in match</button>
              <button class="toggle-btn ${rd.penalty==='N'?'active-green':''}" onclick="updateResultDraft(${m.id},'penalty','N')">✗ No penalty</button>
            </div>
            <button class="lock-btn green" onclick="submitResult(${m.id})" ${rd.scoreA===""||rd.scoreB===""?"disabled":""}>✓ Confirm Result</button>
          </div>
        ` : ""}
      </div>
    `;
  } else {
    resultHtml = `
      <div class="result-section">
        <div class="result-banner">
          <div>
            <div class="result-label">Final Score</div>
            <div class="final-score">${esc(m.teamA)} ${esc(result.scoreA)} – ${esc(result.scoreB)} ${esc(m.teamB)}
              <span class="final-extras">${result.draw==='Y'?'Draw':''} ${result.penalty==='Y'?'· Pen':''}</span>
            </div>
          </div>
          <div style="display:flex;gap:6px">
            ${luisPts!==null?`<span class="pts-badge ${ptsClass(luisPts)}">L: ${luisPts}</span>`:""}
            ${bibiPts!==null?`<span class="pts-badge ${ptsClass(bibiPts)}">B: ${bibiPts}</span>`:""}
          </div>
        </div>
      </div>
    `;
  }

  return `
    <div class="card ${isLocked?'locked':''}">
      <div class="card-header">
        <span class="match-meta">#${m.id} · ${esc(m.date)} · ${esc(m.venue)}</span>
        <span class="group-badge" style="background:${GROUP_COLORS[m.group]||'#555'}">Group ${m.group}</span>
      </div>
      <div class="teams-row">
        <div class="team"><div class="team-flag">${flag(m.teamA)}</div><div class="team-name">${esc(m.teamA)}</div></div>
        <div class="vs">VS</div>
        <div class="team"><div class="team-flag">${flag(m.teamB)}</div><div class="team-name">${esc(m.teamB)}</div></div>
      </div>
      ${predHtml}
      ${otherHtml}
      ${resultHtml}
    </div>
  `;
}

function renderStandings(t, completedCount) {
  const luisLeading = t.luis > t.bibi;
  const bibiLeading = t.bibi > t.luis;
  const tie = t.luis === t.bibi;
  const diff = Math.abs(t.luis - t.bibi);
  const dollars = ((diff / PAYOUT.ptsPerUnit) * PAYOUT.dollarsPerUnit).toFixed(2);

  return `
    <div class="section-title">Tournament Standing</div>
    <div class="player-row ${luisLeading?'winning':''}">
      <div><div class="player-name">${luisLeading?'🏆 ':''}Luis</div></div>
      <div class="big-pts">${t.luis}<span> pts</span></div>
    </div>
    <div class="player-row ${bibiLeading?'winning':''}">
      <div><div class="player-name">${bibiLeading?'🏆 ':''}Bibi</div></div>
      <div class="big-pts">${t.bibi}<span> pts</span></div>
    </div>
    <div class="standings-card" style="margin-top:16px">
      <div class="result-label" style="margin-bottom:8px">Payout</div>
      ${tie
        ? `<div class="payout-even">🤝 All square — no money changes hands</div>`
        : `<div class="payout-text">${luisLeading?'Bibi':'Luis'} owes ${luisLeading?'Luis':'Bibi'} <span class="amount">$${dollars}</span>
            <div class="payout-sub">${diff} pts difference · ${PAYOUT.ptsPerUnit} pts = $${PAYOUT.dollarsPerUnit}</div>
          </div>`
      }
    </div>
    <div class="standings-card">
      <div class="result-label" style="margin-bottom:8px">Progress</div>
      <div class="progress-row"><span style="color:rgba(255,255,255,0.6)">Group Stage</span><span style="font-weight:700">${completedCount} / ${GROUP_MATCHES.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(completedCount/GROUP_MATCHES.length)*100}%"></div></div>
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
