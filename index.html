function loadLocalCache() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.predictions = saved.predictions || {};
      state.results = saved.results || {};
      state.user = saved.user || null;
      if (saved.scoring) SCORING = { ...DEFAULT_SCORING, ...saved.scoring };
      if (saved.payout) PAYOUT = { ...DEFAULT_PAYOUT, ...saved.payout };
      if (saved.multipliers) MULTIPLIERS = { ...DEFAULT_MULTIPLIERS, ...saved.multipliers };
      if (saved.late) LATE = { ...DEFAULT_LATE, ...saved.late };
      if (saved.knockout) state.knockout = { matches: [], r32Assignments: {}, ...saved.knockout };
    }
  } catch (e) { console.error("local load failed", e); }
}

function saveLocalCache() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      predictions: state.predictions,
      results: state.results,
      user: state.user,
      scoring: SCORING,
      payout: PAYOUT,
      multipliers: MULTIPLIERS,
      late: LATE,
      knockout: { r32Assignments: state.knockout.r32Assignments || {} },
    }));
  } catch (e) { console.error("local cache failed", e); }
}

// Real-time listeners: Firestore is source of truth
function startFirestoreSync() {
  if (!db) return;
  db.collection("tracker").doc("predictions").onSnapshot(doc => {
    fsConnected = true;
    if (doc.exists) {
      try {
        const data = JSON.parse(doc.data().json || "{}");
        state.predictions = data;
        saveLocalCache();
        render();
      } catch (e) { console.error("predictions parse failed", e); }
    }
  }, err => { fsConnected = false; console.error("predictions listener error", err); render(); });

  db.collection("tracker").doc("results").onSnapshot(doc => {
    fsConnected = true;
    if (doc.exists) {
      try {
        const data = JSON.parse(doc.data().json || "{}");
        state.results = data;
        saveLocalCache();
        refreshKnockout();
        render();
      } catch (e) { console.error("results parse failed", e); }
    }
  }, err => { fsConnected = false; console.error("results listener error", err); render(); });

  db.collection("tracker").doc("settings").onSnapshot(doc => {
    fsConnected = true;
    if (doc.exists) {
      try {
        const data = JSON.parse(doc.data().json || "{}");
        SCORING = { ...DEFAULT_SCORING, scoreA: data.scoreA ?? 15, scoreB: data.scoreB ?? 15, winner: data.winner ?? 10, draw: data.draw ?? 5, penalty: data.penalty ?? 5, redCard: data.redCard ?? 5, overtime: data.overtime ?? 5 };
        PAYOUT = { ptsPerUnit: data.ptsPerUnit ?? 100, dollarsPerUnit: data.dollarsPerUnit ?? 20 };
        if (data.multipliers) MULTIPLIERS = { ...DEFAULT_MULTIPLIERS, ...data.multipliers };
        if (data.late) LATE = { ...DEFAULT_LATE, ...data.late };
        saveLocalCache();
        refreshKnockout();
        render();
      } catch (e) { console.error("settings parse failed", e); }
    }
  }, err => { fsConnected = false; console.error("settings listener error", err); render(); });

  db.collection("tracker").doc("knockout").onSnapshot(doc => {
    fsConnected = true;
    if (doc.exists) {
      try {
        const data = JSON.parse(doc.data().json || "{}");
        state.knockout.r32Assignments = data.r32Assignments || {};
        saveLocalCache();
        refreshKnockout();
        render();
      } catch (e) { console.error("knockout parse failed", e); }
    }
  }, err => { console.error("knockout listener error", err); });
}

// Rebuild knockout matches from current standings + saved third-place assignments
function refreshKnockout() {
  // Build progressively: R32 is the fixed official bracket; R16 fills from R32 winners.
  const built = buildR32();
  const r16 = buildR16(built.matches);
  state.knockout.matches = built.matches.concat(r16);
}

async function pushDoc(docName, obj) {
  if (!db) { alert("⚠️ No database connection — change not synced"); return false; }
  try {
    await db.collection("tracker").doc(docName).set({ json: JSON.stringify(obj) });
    return true;
  } catch (e) {
    console.error("push failed", e);
    alert("⚠️ Sync failed — check your connection and try again");
    return false;
  }
}

// ── Validation ────────────────────────────────────────────────────────────────
// Compares an entered result against the uploaded official data.
// Returns null if no official data for this match, else { match, diffs:[], ok:bool }
function validateMatch(id) {
  if (!officialResults || !officialResults[id]) return null;
  const entered = state.results[id];
  if (!entered || !entered.entered) return null;
  const off = officialResults[id];
  const diffs = [];
  if (String(entered.scoreA) !== String(off.scoreA)) diffs.push({ field: "Score Team A", entered: entered.scoreA, official: off.scoreA });
  if (String(entered.scoreB) !== String(off.scoreB)) diffs.push({ field: "Score Team B", entered: entered.scoreB, official: off.scoreB });
  if (off.penalty != null && off.penalty !== "" && entered.penalty !== off.penalty) diffs.push({ field: "Penalty", entered: entered.penalty, official: off.penalty });
  if (off.redCard != null && off.redCard !== "" && (entered.redCard || "") !== off.redCard) diffs.push({ field: "Red Card", entered: entered.redCard || "(none)", official: off.redCard });
  return { ok: diffs.length === 0, diffs };
}

// Count how many completed matches have mismatches against uploaded data
function countFlagged() {
  if (!officialResults) return 0;
  let n = 0;
  GROUP_MATCHES.forEach(m => { const v = validateMatch(m.id); if (v && !v.ok) n++; });
  return n;
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcPoints(pred, result, stage) {
  if (!pred || !pred.locked || !result || !result.entered) return null;
  const isKO = (stage || "Group") !== "Group";
  let pts = 0;
  if (String(pred.scoreA) === String(result.scoreA)) pts += SCORING.scoreA;
  if (String(pred.scoreB) === String(result.scoreB)) pts += SCORING.scoreB;

  if (isKO) {
    // Knockouts: winner = whoever the player predicted to ADVANCE.
    // Decisive scoreline implies the advancing team; a level prediction uses the explicit "advances" pick.
    const pa = Number(pred.scoreA), pb = Number(pred.scoreB);
    let predAdvance = pred.advance; // "A" | "B" | undefined
    if (!predAdvance && pa !== pb) predAdvance = pa > pb ? "A" : "B";
    if (predAdvance && predAdvance === result.winner) pts += SCORING.winner;
    // Overtime Y/N: did the match go past 90 minutes
    if (pred.overtime !== undefined && pred.overtime !== "" && result.overtime !== undefined && result.overtime !== "") {
      if (pred.overtime === result.overtime) pts += (SCORING.overtime || 0);
    }
  } else {
    // Group stage: original draw logic
    if (result.draw === "Y") {
      if (pred.draw === "Y") pts += SCORING.draw;
    } else {
      const predWinner = Number(pred.scoreA) > Number(pred.scoreB) ? "A" : "B";
      if (predWinner === result.winner) pts += SCORING.winner;
    }
  }

  // Penalty: in knockouts this means "penalty kick in play OR a shootout"; in groups, penalty in play.
  if (pred.penalty === result.penalty) pts += SCORING.penalty;
  // Red card: only scored when both the prediction and result include it (added mid-tournament)
  if (pred.redCard !== undefined && pred.redCard !== "" && result.redCard !== undefined && result.redCard !== "") {
    if (pred.redCard === result.redCard) pts += (SCORING.redCard || 0);
  }
  // Apply stage multiplier (group = 1x, knockouts weighted)
  const mult = stageMultiplier(stage || "Group");
  let total = pts * mult;
  // Apply late-bet haircut if this prediction was locked after kickoff
  if (pred.late) total = total * ((LATE.latePercent ?? 50) / 100);
  return total;
}

// All matches = group stage + any knockout matches created in state.knockout
function allMatches() {
  const ko = (state.knockout && state.knockout.matches) ? state.knockout.matches : [];
  return GROUP_MATCHES.concat(ko);
}

// Stage for a given match id
function matchStage(m) {
  return m.stage || "Group";
}

// ── Group standings computation ───────────────────────────────────────────────
// Returns { A: [team objects sorted], B: [...], ... } using entered group results.
// Each team: { team, played, won, drawn, lost, gf, ga, gd, points, group }
function computeGroupStandings() {
  const groups = {};
  GROUP_MATCHES.forEach(m => {
    [m.teamA, m.teamB].forEach(team => {
      if (!groups[m.group]) groups[m.group] = {};
      if (!groups[m.group][team]) groups[m.group][team] = { team, group: m.group, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, points:0 };
    });
    const r = state.results[m.id];
    if (!r || !r.entered) return;
    const a = groups[m.group][m.teamA], b = groups[m.group][m.teamB];
    const sa = Number(r.scoreA), sb = Number(r.scoreB);
    a.played++; b.played++;
    a.gf += sa; a.ga += sb; b.gf += sb; b.ga += sa;
    if (sa > sb) { a.won++; a.points += 3; b.lost++; }
    else if (sb > sa) { b.won++; b.points += 3; a.lost++; }
    else { a.drawn++; b.drawn++; a.points++; b.points++; }
  });
  // sort each group
  const sorted = {};
  Object.keys(groups).sort().forEach(g => {
    sorted[g] = Object.values(groups[g]).map(t => ({ ...t, gd: t.gf - t.ga }))
      .sort(sortTeams);
  });
  return sorted;
}

// Tiebreak: points, then GD, then GF (FIFA also uses head-to-head/conduct, omitted here)
function sortTeams(x, y) {
  if (y.points !== x.points) return y.points - x.points;
  if (y.gd !== x.gd) return y.gd - x.gd;
  if (y.gf !== x.gf) return y.gf - x.gf;
  return x.team.localeCompare(y.team);
}

// Are all 48 group matches entered? (bracket only auto-builds when group stage complete)
function groupStageComplete() {
  return GROUP_MATCHES.every(m => (state.results[m.id]||{}).entered);
}

// Count entered group matches (for progress display)
function groupMatchesEntered() {
  return GROUP_MATCHES.filter(m => (state.results[m.id]||{}).entered).length;
}

// Ranked third-place teams across all 12 groups (best first)
function rankedThirdPlace(standings) {
  const thirds = [];
  Object.keys(standings).forEach(g => {
    if (standings[g][2]) thirds.push(standings[g][2]);
  });
  return thirds.sort(sortTeams);
}

// Is a specific group's matches all entered?
function groupComplete(g) {
  return GROUP_MATCHES.filter(m => m.group === g).every(m => (state.results[m.id]||{}).entered);

// Build the Round of 32 from the official fixed bracket. All 16 matchups are known.
function buildR32() {
  const matches = R32_OFFICIAL.map(m => ({
    id: m.id, stage: "Round of 32", round: "R32",
    matchNo: m.matchNo, date: m.date, time: m.time, venue: m.venue,
    teamA: m.teamA, teamB: m.teamB,
    teamAResolved: true, teamBResolved: true,
  }));
  // No manual third-place assignment needed anymore — bracket is fixed.
  return { matches, thirdSlots: 0, thirdAssigned: 0 };
}

// Determine the winning TEAM NAME of a knockout match from its entered result.
// Uses result.winner ("A"/"B") which submitResult sets (including who advanced on level scores).
function knockoutWinnerTeam(match) {
  const r = state.results[match.id];
  if (!r || !r.entered) return null;
  if (r.winner === "A") return match.teamA;
  if (r.winner === "B") return match.teamB;
  return null; // shouldn't happen for knockouts (always a winner)
}

// Build the Round of 16 from R32 winners. Teams fill in as R32 results are entered.
function buildR16(r32Matches) {
  const byMatchNo = {};
  r32Matches.forEach(m => { byMatchNo[m.matchNo] = m; });

  return R16_STRUCTURE.map(slot => {
    const [feedA, feedB] = slot.feeds;
    const srcA = byMatchNo[feedA], srcB = byMatchNo[feedB];
    const teamA = srcA ? knockoutWinnerTeam(srcA) : null;
    const teamB = srcB ? knockoutWinnerTeam(srcB) : null;
    return {
      id: slot.id, stage: "Round of 16", round: "R16",
      matchNo: slot.matchNo, date: slot.date, time: slot.time, venue: slot.venue,
      teamA: teamA || `Winner #${feedA}`,
      teamB: teamB || `Winner #${feedB}`,
      teamAResolved: !!teamA, teamBResolved: !!teamB,
      feeds: slot.feeds,
    };
  });
}

// Human label for an unresolved slot side (kept for backward-compat; unused now)
function labelFor(side) {
  if (!side) return "TBD";
  if (side.type === "W") return "Winner " + side.group;
  if (side.type === "R") return "Runner-up " + side.group;
  if (side.type === "3RD") return "3rd Place (TBD)";
  return "TBD";
}

function totals() {
  let luis = 0, bibi = 0;
  allMatches().forEach(m => {
    const lp = calcPoints((state.predictions[m.id]||{}).luis, state.results[m.id], matchStage(m));
    const bp = calcPoints((state.predictions[m.id]||{}).bibi, state.results[m.id], matchStage(m));
    if (lp !== null) luis += lp;
    if (bp !== null) bibi += bp;
  });
  return { luis, bibi };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// Parse "Jun 14" + year 2026 into a Date (kickoffs are 2026)
function matchDate(m) {
  const months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
  const parts = m.date.split(" ");
  const mo = months[parts[0]];
  const day = parseInt(parts[1], 10);
  if (mo === undefined || isNaN(day)) return null;
  return new Date(2026, mo, day);
}

// Has at least one full day passed since the match date?
// Compute the real kickoff Date for a match (ET). Times in data are ET; we build a Date
// in ET by parsing date + time and treating as America/New_York via a fixed offset approach.
// Simpler robust approach: build an ISO string with -04:00 (EDT, which covers Jun-Jul 2026).
function kickoffDate(m) {
  if (!m.date || !m.time) return null;
  const months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
  const [mo, day] = m.date.split(" ");
  const month = months[mo];
  if (month === undefined) return null;
  // parse "7:00 PM"
  const tm = m.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!tm) return null;
  let hr = parseInt(tm[1],10); const min = parseInt(tm[2],10); const ap = tm[3].toUpperCase();
  if (ap === "PM" && hr !== 12) hr += 12;
  if (ap === "AM" && hr === 12) hr = 0;
  // EDT offset is -04:00 across the tournament window (June-July 2026)
  const iso = `2026-${String(month+1).padStart(2,"0")}-${String(parseInt(day,10)).padStart(2,"0")}T${String(hr).padStart(2,"0")}:${String(min).padStart(2,"0")}:00-04:00`;
  const d = new Date(iso);
  return isNaN(d.getTime()) ? null : d;
}

// The "betting day" a match belongs to. Games kicking off 00:00-03:59 ET roll into the PREVIOUS day.
function bettingDay(m) {
  const ko = kickoffDate(m);
  if (!ko) {
    // fall back to the plain date if no kickoff time
    const d = matchDate(m);
    return d ? ymd(d) : null;
  }
  // Work in ET. ko is a real Date; shift to ET wall-clock by using the -4 offset baked into kickoffDate.
  // Recover ET hour from the ISO we built: easier to recompute from m.time.
  const tm = (m.time||"").match(/(\d+):(\d+)\s*(AM|PM)/i);
  let etHour = null;
  if (tm) {
    etHour = parseInt(tm[1],10);
    const ap = tm[3].toUpperCase();
    if (ap === "PM" && etHour !== 12) etHour += 12;
    if (ap === "AM" && etHour === 12) etHour = 0;
  }
  const baseDate = matchDate(m); // calendar date from m.date
  if (!baseDate) return null;
  if (etHour !== null && etHour >= 0 && etHour < 4) {
    // roll into previous day
    const prev = new Date(baseDate.getTime());
    prev.setDate(prev.getDate() - 1);
    return ymd(prev);
  }
  return ymd(baseDate);
}

function ymd(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

// Today's betting day key in ET (so "today" matches kickoff grouping)
function todayKeyET() {
  // Get current ET wall-clock date
  const now = new Date();
  // Convert to ET via locale string trick
  const etStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
  const et = new Date(etStr);
  // Apply the same 0-4AM rollback so early games count as "yesterday's" slate
  if (et.getHours() >= 0 && et.getHours() < 4) {
    const prev = new Date(et.getTime());
    prev.setDate(prev.getDate() - 1);
    return ymd(prev);
  }
  return ymd(et);
}

// Is a prediction being locked NOW considered late (after kickoff)?
function isLateNow(m) {
  const ko = kickoffDate(m);
  if (!ko) return false; // if we can't determine kickoff, never penalize
  return new Date() >= ko;
}

function dayHasPassed(m) {
  const d = matchDate(m);
  if (!d) return false;
  const now = new Date();
  const dayAfter = new Date(d.getTime());
  dayAfter.setDate(dayAfter.getDate() + 1);
  return now >= dayAfter;
}

// Is there official data available to suggest for this match?
function hasSuggestion(id) {
  return !!(officialResults && officialResults[id]);
}
function flag(team) {
  const code = FLAG_CODES[team];
  if (!code) return '<span style="font-size:24px">🏳️</span>';
  return `<img src="https://flagcdn.com/w80/${code}.png" alt="${esc(team)}" loading="lazy"
    style="width:40px;height:auto;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.4)">`;
}
function ptsClass(p) { return p >= 40 ? "high" : p >= 20 ? "mid" : ""; }

  else PAYOUT[field] = num;
  saveLocalCache();
  render();
  await pushDoc("settings", { ...SCORING, ...PAYOUT, multipliers: MULTIPLIERS, late: LATE });
};

window.updateDraft = function(id, field, value) {
  drafts[id] = drafts[id] || { scoreA:"", scoreB:"", draw:"", penalty:"", redCard:"", overtime:"" };
  drafts[id][field] = value;
  render();
};
window.lockPrediction = async function(id) {
  const d = drafts[id];
  if (!d || d.scoreA === "" || d.scoreB === "") return;

  // Hard cutoff: can't predict once a result is entered
  if ((state.results[id]||{}).entered) {
    alert("This match already has a result entered — predictions are closed.");
    return;
  }

  // Find the match to check kickoff time + knockout rules
  const m = allMatches().find(x => x.id === id);
  const isKO = m && matchStage(m) !== "Group";
  const levelScore = String(d.scoreA) === String(d.scoreB);

  // Knockout + level score requires picking who advances
  if (isKO && levelScore && d.advance !== "A" && d.advance !== "B") {
    alert("This is a level score in a knockout — pick which team advances before locking.");
    return;
  }
  // Decisive score: set advance from scoreline so it's always stored
  if (isKO && !levelScore) {
    d.advance = Number(d.scoreA) > Number(d.scoreB) ? "A" : "B";
  }

  const late = m ? isLateNow(m) : false;

  if (late) {
    const pct = LATE.latePercent ?? 50;
    if (!confirm(`⏰ This bet is LATE — kickoff has passed.\n\nIt will score only ${pct}% of normal points. Lock it anyway?`)) return;
  } else {
    if (!confirm("Lock this prediction? It can't be changed after.")) return;
  }

  const userKey = state.user.toLowerCase();
  state.predictions[id] = state.predictions[id] || {};
  state.predictions[id][userKey] = { ...d, locked: true, lockedAt: new Date().toISOString(), late: late };
  saveLocalCache();
  delete drafts[id];
  render();
  await pushDoc("predictions", state.predictions);
};
window.toggleResultForm = function(id) { resultOpen[id] = !resultOpen[id]; render(); };
window.reopenPrediction = async function(id) {
  if ((state.results[id]||{}).entered) { alert("Result already entered — can't edit."); return; }
  const userKey = state.user.toLowerCase();
  const mine = (state.predictions[id]||{})[userKey];
  if (!mine) return;
  if (!confirm("Re-open this prediction to edit it? It will be unlocked until you lock again.")) return;
  drafts[id] = { scoreA: mine.scoreA, scoreB: mine.scoreB, draw: mine.draw||"", penalty: mine.penalty||"", redCard: mine.redCard||"", overtime: mine.overtime||"", advance: mine.advance||"" };
  delete state.predictions[id][userKey];
  saveLocalCache();
  render();
  await pushDoc("predictions", state.predictions);
};
window.updateResultDraft = function(id, field, value) {
  resultDrafts[id] = resultDrafts[id] || { scoreA:"", scoreB:"", penalty:"", overtime:"" };
  resultDrafts[id][field] = value;
  render();
};
window.submitResult = async function(id) {
  const d = resultDrafts[id];
  if (!d || d.scoreA === "" || d.scoreB === "") return;

  const m = allMatches().find(x => x.id === id);
  const isKO = m && matchStage(m) !== "Group";

  const levelScore = String(d.scoreA) === String(d.scoreB);
  let winner = levelScore ? "" : (Number(d.scoreA) > Number(d.scoreB) ? "A" : "B");
  let draw = levelScore ? "Y" : "N";

  // Knockouts always have a winner. If the score is level, ask who advanced (shootout/ET).
  if (isKO && levelScore) {
    const ans = prompt(`This knockout match is level at ${d.scoreA}-${d.scoreB}. Who ADVANCED?\n\nType A for ${m.teamA}, or B for ${m.teamB}:`, "");
    if (ans === null) return; // cancelled
    const a = ans.trim().toUpperCase();
    if (a !== "A" && a !== "B") { alert("Please enter A or B."); return; }
    winner = a;
    draw = "N"; // not a draw in a knockout — someone advanced
  }

  if (!confirm("Confirm final result? This scores the match.")) return;

  state.results[id] = {
    scoreA: d.scoreA, scoreB: d.scoreB,
    penalty: d.penalty || "N", redCard: d.redCard || "",
    overtime: isKO ? (d.overtime || "N") : "",
    draw, winner, entered: true, enteredBy: state.user
  };
  saveLocalCache();
  delete resultDrafts[id]; delete resultOpen[id];
  render();
  await pushDoc("results", state.results);
};
window.uploadOfficialResults = function() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const r = data.results || data;
        if (typeof r !== "object") throw new Error("bad shape");
        officialResults = r;
        const matchCount = Object.keys(r).length;
        const flagged = countFlagged();
        render();
        alert("✓ Loaded official data for " + matchCount + " match(es).\n" +
          (flagged > 0 ? "⚠️ " + flagged + " completed match(es) need attention — see the Completed tab." : "All entered results match so far."));
      } catch (err) {
        alert("Couldn't read that file. Make sure it's the results JSON with a 'results' object.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
};

// Apply official data as the result for an in-progress match (suggestion fill)
window.applySuggestion = async function(id) {
  if (!hasSuggestion(id)) return;
  const off = officialResults[id];
  if (!confirm("Fill in the suggested result " + off.scoreA + "–" + off.scoreB + "? You can still edit before it scores.")) return;
  const draw = String(off.scoreA) === String(off.scoreB) ? "Y" : "N";
  const winner = draw === "Y" ? "" : (Number(off.scoreA) > Number(off.scoreB) ? "A" : "B");
  const penaltyKnown = off.penalty != null && off.penalty !== "";
  const redKnown = off.redCard != null && off.redCard !== "";
  state.results[id] = {
    scoreA: off.scoreA, scoreB: off.scoreB,
    penalty: penaltyKnown ? off.penalty : "",
    redCard: redKnown ? off.redCard : "",
    draw, winner, entered: true, enteredBy: state.user + " (suggested)",
    needsDetail: (!penaltyKnown || !redKnown)
  };
  saveLocalCache();
  render();
  await pushDoc("results", state.results);
  if (!penaltyKnown || !redKnown) {
    alert("⚠️ Scores filled in, but penalty/red-card weren't in the data. Tap the result to set those before trusting the points.");
  }
};

// Overwrite an entered (flagged) result with the official values
window.applyOfficialFix = async function(id) {
  if (!hasSuggestion(id)) return;
  const off = officialResults[id];
  if (!confirm("Replace your entered result with the official " + off.scoreA + "–" + off.scoreB + "? This re-scores the match.")) return;
  const draw = String(off.scoreA) === String(off.scoreB) ? "Y" : "N";
  const winner = draw === "Y" ? "" : (Number(off.scoreA) > Number(off.scoreB) ? "A" : "B");
  state.results[id] = {
    scoreA: off.scoreA, scoreB: off.scoreB,
    penalty: off.penalty || "N", redCard: off.redCard || "",
    draw, winner, entered: true, enteredBy: state.user + " (corrected)"
  };
  saveLocalCache();
  render();
  await pushDoc("results", state.results);
};

window.exportData = function() {
  const data = JSON.stringify({ predictions: state.predictions, results: state.results, scoring: SCORING, payout: PAYOUT }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wc26_tracker_backup.json";
  a.click();
};
window.importData = function() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!confirm("Import this data? It will MERGE with existing data (imported entries win conflicts).")) return;
        // Merge: imported locked predictions and results take precedence
        Object.keys(data.predictions || {}).forEach(id => {
          state.predictions[id] = state.predictions[id] || {};
          ["luis","bibi"].forEach(k => {
            if (data.predictions[id][k] && data.predictions[id][k].locked) {
              state.predictions[id][k] = data.predictions[id][k];
            }
          });
        });
        Object.keys(data.results || {}).forEach(id => {
          if (data.results[id] && data.results[id].entered) state.results[id] = data.results[id];
        });
        if (data.scoring) SCORING = { ...DEFAULT_SCORING, ...data.scoring };
        if (data.payout) PAYOUT = { ...DEFAULT_PAYOUT, ...data.payout };
        saveLocalCache();
        render();
        pushDoc("predictions", state.predictions);
        pushDoc("results", state.results);
        pushDoc("settings", { ...SCORING, ...PAYOUT, multipliers: MULTIPLIERS, late: LATE });
        alert("✓ Imported and synced");
      } catch (err) { alert("Import failed: invalid file"); }
    };
    reader.readAsText(file);
  };
  input.click();
};

// Get a team's last N results from entered matches (group + knockout), most recent first.
// Returns array of { opponent, gf, ga, outcome: 'W'|'L'|'D', label }
function teamRecentForm(teamName, n, excludeMatchId) {
  const played = allMatches().filter(m => {
    if (m.id === excludeMatchId) return false;
    const r = state.results[m.id];
    return r && r.entered && (m.teamA === teamName || m.teamB === teamName);
  });
  // sort by kickoff/date, most recent first
  played.sort((a, b) => {
    const ka = kickoffDate(a) || matchDate(a), kb = kickoffDate(b) || matchDate(b);
    if (ka && kb && ka.getTime() !== kb.getTime()) return kb - ka;
    return b.id - a.id;
  });
  return played.slice(0, n).map(m => {
    const r = state.results[m.id];
    const isA = m.teamA === teamName;
    const gf = Number(isA ? r.scoreA : r.scoreB);
    const ga = Number(isA ? r.scoreB : r.scoreA);
    const opp = isA ? m.teamB : m.teamA;
    const outcome = gf > ga ? "W" : (ga > gf ? "L" : "D");
    return { opponent: opp, gf, ga, outcome, label: `${gf}-${ga} vs ${opp}` };
  });
}

// Render a compact recent-form line for a team (inline items, no wrapper)
function formLine(teamName, excludeMatchId) {
  const form = teamRecentForm(teamName, 3, excludeMatchId);
  if (form.length === 0) return "";
  const colors = { W:"#2ecc71", L:"#e74c3c", D:"#f9c22e" };
  return form.map(f =>
    `<span style="color:${colors[f.outcome]};font-weight:600">${f.gf}-${f.ga}</span> <span style="color:rgba(255,255,255,0.4)">vs ${esc(f.opponent)}</span>`
  ).join(' <span style="color:rgba(255,255,255,0.2)">·</span> ');
}

  // Other player's prediction visibility: only show if locked AND (you've locked too OR result entered)

      suggestHtml = `

          <div style="font-size:11px;color:#2ecc71;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">📋 Suggested result available</div>

          <button onclick="applySuggestion(${m.id})" style="width:100%;height:38px;border-radius:7px;background:linear-gradient(135deg,#2ecc71,#1a9e52);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit">⤵ Fill in this result</button>
        </div>`;
    } else if (dayHasPassed(m)) {
      suggestHtml = `
        <div style="margin:0 14px 10px;background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);border-radius:8px;padding:9px 12px;font-size:12px;color:#f9c22e">
          ⏰ This match has played — enter the result below, or upload official data to auto-fill.
        </div>`;
    }
  }

  let resultHtml = "";
  if (!hasResult) {
    resultHtml = `
      <div class="result-section">
        ${suggestHtml}
        <div class="result-header">
          <div class="result-label">Actual Result</div>
          <button class="result-toggle-btn ${resultOpen[m.id]?'open':''}" onclick="toggleResultForm(${m.id})">${resultOpen[m.id]?'Cancel':'Enter Result'}</button>
        </div>
        ${resultOpen[m.id] ? `
          <div class="result-form">
            <div class="score-row">
              <input class="result-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(rd.scoreA)}"
                oninput="updateResultDraft(${m.id},'scoreA',this.value)">
              <div class="score-label" style="color:#2ecc71">${esc(m.teamA)} vs ${esc(m.teamB)}</div>
              <input class="result-input" type="number" inputmode="numeric" min="0" max="20" placeholder="0" value="${esc(rd.scoreB)}"
                oninput="updateResultDraft(${m.id},'scoreB',this.value)">
            </div>
            ${isKO && rd.scoreA !== "" && rd.scoreB !== "" && String(rd.scoreA) === String(rd.scoreB) ? `
              <div style="background:rgba(243,156,18,0.12);border:1px solid rgba(243,156,18,0.4);border-radius:8px;padding:9px 11px;margin-bottom:10px;font-size:12px;color:#f9c22e;line-height:1.5">
                ⚠️ <strong>Level score — no draws in knockouts.</strong> When you confirm, you'll be asked who advanced (${esc(m.teamA)} or ${esc(m.teamB)}) so the winner gets scored.
              </div>` : ""}
            ${isKO ? `
            <div class="toggle-row">
              <button class="toggle-btn ${rd.overtime==='Y'?'active-blue':''}" onclick="updateResultDraft(${m.id},'overtime','Y')">✓ Went to overtime</button>
              <button class="toggle-btn ${rd.overtime==='N'?'active-blue':''}" onclick="updateResultDraft(${m.id},'overtime','N')">✗ No overtime</button>
            </div>` : ""}
            <div class="toggle-row">
              <button class="toggle-btn ${rd.penalty==='Y'?'active-green':''}" onclick="updateResultDraft(${m.id},'penalty','Y')">✓ ${isKO?'Penalty kick / shootout':'Penalty in match'}</button>
              <button class="toggle-btn ${rd.penalty==='N'?'active-green':''}" onclick="updateResultDraft(${m.id},'penalty','N')">✗ ${isKO?'Neither':'No penalty'}</button>
            </div>
            <div class="toggle-row">
              <button class="toggle-btn ${rd.redCard==='Y'?'active-red':''}" onclick="updateResultDraft(${m.id},'redCard','Y')">🟥 Red card shown</button>
              <button class="toggle-btn ${rd.redCard==='N'?'active-red':''}" onclick="updateResultDraft(${m.id},'redCard','N')">✗ No red card</button>
            </div>
            <button class="lock-btn green" onclick="submitResult(${m.id})" ${rd.scoreA===""||rd.scoreB===""?"disabled":""}>✓ Confirm Result</button>
          </div>
        ` : ""}
      </div>
    `;
  } else {
    const v = validateMatch(m.id);
    let validHtml = "";
    if (v) {

        validHtml = `<div style="margin-top:8px;font-size:11px;color:#2ecc71;font-weight:600">✓ Matches official data</div>`;
      } else {
        const off = officialResults[m.id];
        validHtml = `
          <div style="margin-top:8px;background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.35);border-radius:8px;padding:9px 11px">

            <button onclick="applyOfficialFix(${m.id})" style="width:100%;height:34px;border-radius:7px;background:#e74c3c;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin-top:6px">Use official result (re-score)</button>
          </div>`;
      }
    }
    resultHtml = `
      <div class="result-section">
        <div class="result-banner">

  return `
    <div class="card ${isLocked?'locked':''}">

        <span class="group-badge" style="background:${m.group ? (GROUP_COLORS[m.group]||'#555') : '#34495e'}">${m.group ? 'Group '+m.group : esc(m.round||m.stage||'KO')}</span>

      <div class="teams-row">

// Magic Number + Gap attribution — the "how's the bet going and why" breakdown (Standings tab)
function renderLeadBreakdown() {
  const st = computeStats();
  const L = st.players.luis, B = st.players.bibi;
  if (st.scoredMatches === 0) return "";

  // ── Magic number ──
  const leader = L.total >= B.total ? "Luis" : "Bibi";
  const trailer = leader === "Luis" ? "Bibi" : "Luis";
  const lead = Math.abs(L.total - B.total);
  const trailerMax = leader === "Luis" ? st.remainingMaxBibi : st.remainingMaxLuis;
  const stillPossible = trailerMax >= lead;
  const magicHtml = `
    <div class="standings-card" style="border-color:${stillPossible ? 'rgba(243,156,18,0.3)' : 'rgba(46,204,113,0.4)'}">
      <div style="font-size:13px;font-weight:700;color:${stillPossible ? '#f9c22e' : '#2ecc71'};margin-bottom:8px">
        ${stillPossible ? '🎯 Still up for grabs' : '🏆 ' + leader + ' has clinched it'}
      </div>
      ${st.remainingCount === 0
        ? `<div style="font-size:14px;color:#fff;font-weight:700">Tournament complete — ${L.total === B.total ? "it's a tie!" : leader + " wins by " + lead + " pts"}</div>`
        : stillPossible
          ? `<div style="font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6">
              <strong style="color:#fff">${leader}</strong> leads by <strong style="color:#f9c22e">${lead} pts</strong>.<br>
              <strong>${trailer}</strong> can still gain up to <strong>${trailerMax} pts</strong> over the ${st.remainingCount} remaining match(es) — enough to overturn it.<br>
              <span style="color:rgba(255,255,255,0.55);font-size:12px">${leader} clinches the moment their lead exceeds ${trailer}'s remaining ceiling.</span>
            </div>`
          : `<div style="font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6">
              <strong style="color:#fff">${leader}</strong> leads by <strong style="color:#2ecc71">${lead} pts</strong> with only <strong>${trailerMax} pts</strong> left for ${trailer} to chase. Mathematically out of reach.
            </div>`
      }
    </div>`;

  // ── Gap attribution ──
  const cats = [
    { key: "exact", label: "Exact scores" },
    { key: "winner", label: "Winner calls" },
    { key: "draw", label: "Draw calls" },
    { key: "penalty", label: "Penalty calls" },
    { key: "redCard", label: "Red card calls" },
  ];
  const catDiffs = cats.map(c => ({ ...c, diff: (L.wcat[c.key]||0) - (B.wcat[c.key]||0) }))
    .filter(c => Math.abs(c.diff) > 0)
    .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
  let gapHtml = "";
  if (catDiffs.length > 0) {
    gapHtml = `
      <div class="standings-card">
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:10px;line-height:1.5">
          Net points each category contributes to the gap. ${leader} leads overall — green bars help the leader, red are where the trailer claws back.
        </div>
        ${catDiffs.map(c => {
          const favorsLeader = (leader === "Luis" && c.diff > 0) || (leader === "Bibi" && c.diff < 0);
          const mag = Math.abs(c.diff);
          const maxDiff = Math.max(...catDiffs.map(d => Math.abs(d.diff)), 1);
          const w = (mag / maxDiff) * 100;
          const who = c.diff > 0 ? "Luis" : "Bibi";
          return `
            <div style="margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                <span style="color:rgba(255,255,255,0.7);font-weight:600">${c.label}</span>
                <span style="color:${favorsLeader ? '#2ecc71' : '#e74c3c'};font-weight:700">${who} +${mag}</span>
              </div>
              <div style="height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${w}%;background:${favorsLeader ? '#2ecc71' : '#e74c3c'};border-radius:4px"></div>
              </div>
            </div>`;
        }).join("")}
      </div>`;
  }

  return `
    <div class="section-title">Magic Number 🎯</div>
    ${magicHtml}
    <div class="section-title">Where the Gap Came From 🔍</div>
    ${gapHtml || '<div class="standings-card" style="text-align:center;color:rgba(255,255,255,0.35);font-size:13px">Dead even so far — no gap to attribute.</div>'}
  `;
}

function renderStandings(t, completedCount) {
  const luisLeading = t.luis > t.bibi;
  const bibiLeading = t.bibi > t.luis;
  const tie = t.luis === t.bibi;
  const diff = Math.abs(t.luis - t.bibi);
  const dollars = ((diff / PAYOUT.ptsPerUnit) * PAYOUT.dollarsPerUnit).toFixed(2);

  return `
    <div class="section-title">Tournament Standing</div>
    <div class="player-row ${luisLeading?'winning':''}">
      <div><div class="player-name">${luisLeading?'🏆 ':''}Luis</div></div>
      <div class="big-pts">${t.luis}<span> pts</span></div>
    </div>
    <div class="player-row ${bibiLeading?'winning':''}">
      <div><div class="player-name">${bibiLeading?'🏆 ':''}Bibi</div></div>
      <div class="big-pts">${t.bibi}<span> pts</span></div>
    </div>
    <div class="standings-card" style="margin-top:16px">
      <div class="result-label" style="margin-bottom:8px">Payout</div>
      ${tie
        ? `<div class="payout-even">🤝 All square — no money changes hands</div>`
        : `<div class="payout-text">${luisLeading?'Bibi':'Luis'} owes ${luisLeading?'Luis':'Bibi'} <span class="amount">$${dollars}</span>
            <div class="payout-sub">${diff} pts difference · ${PAYOUT.ptsPerUnit} pts = $${PAYOUT.dollarsPerUnit}</div>
          </div>`
      }
    </div>
    ${renderLeadBreakdown()}
    <div class="standings-card">
      <div class="result-label" style="margin-bottom:8px">Progress</div>
      <div class="progress-row"><span style="color:rgba(255,255,255,0.6)">Group Stage</span><span style="font-weight:700">${completedCount} / ${GROUP_MATCHES.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(completedCount/GROUP_MATCHES.length)*100}%"></div></div>
    </div>
    ${renderCumulativeLead()}
  `;
}

// Cumulative lead chart with a time-window filter (last 5 / 10 / all)
function renderCumulativeLead() {
  const st = computeStats();
  let timeline = st.timeline || [];
  const full = timeline.length;

  // Apply window: keep only the last N points, but the cumulative line should still
  // start from the running totals at that point (so we re-baseline to show recent trend).
  let windowed = timeline;
  if (chartWindow === "5") windowed = timeline.slice(-5);
  else if (chartWindow === "10") windowed = timeline.slice(-10);

  const btn = (val, label) => `<button onclick="setChartWindow('${val}')" style="flex:1;height:30px;border-radius:6px;border:1px solid ${chartWindow===val?'#f9c22e':'rgba(255,255,255,0.12)'};background:${chartWindow===val?'rgba(249,194,46,0.13)':'rgba(255,255,255,0.04)'};color:${chartWindow===val?'#f9c22e':'rgba(255,255,255,0.5)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">${label}</button>`;

  return `
    <div class="section-title">Cumulative Lead 📈</div>
    <div class="standings-card">
      <div style="display:flex;gap:5px;margin-bottom:12px">
        ${btn("5","Last 5")}
        ${btn("10","Last 10")}
        ${btn("all","All")}
      </div>
      ${renderTimelineChart(windowed)}
      ${full > windowed.length ? `<div style="font-size:10px;color:rgba(255,255,255,0.3);text-align:center;margin-top:8px">Showing last ${windowed.length} of ${full} scored matches</div>` : ""}
    </div>
  `;
}

// ── Completed tab (sort + filter + flags) ─────────────────────────────────────
function renderToday(todayMatches, todayKey) {
  // Friendly date label
  const parts = todayKey ? todayKey.split("-") : null;
  const dateLabel = parts ? new Date(parts[0], parts[1]-1, parts[2]).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }) : "Today";

  if (todayMatches.length === 0) {
    // Find the next day that has matches
    const allM = GROUP_MATCHES.concat((state.knockout.matches||[]).filter(m => m.teamAResolved && m.teamBResolved));
    const futureDays = [...new Set(allM.map(m => bettingDay(m)).filter(Boolean).filter(d => d > todayKey))].sort();
    const nextDay = futureDays[0];
    let nextLabel = "";
    if (nextDay) {
      const np = nextDay.split("-");
      const nextMatches = allM.filter(m => bettingDay(m) === nextDay);
      nextLabel = `<div style="margin-top:14px;font-size:13px;color:rgba(255,255,255,0.6)">Next up: <strong style="color:#f9c22e">${new Date(np[0],np[1]-1,np[2]).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</strong> — ${nextMatches.length} match${nextMatches.length===1?'':'es'}</div>`;
    }
    return `
      <div class="standings-card" style="text-align:center;padding:28px 16px">
        <div style="font-size:40px;margin-bottom:8px">📅</div>
        <div style="font-size:16px;font-weight:800;margin-bottom:4px">No matches today</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.5)">${dateLabel}</div>
        ${nextLabel}
      </div>`;
  }

  // Split: needs your prediction vs already locked/done
  const userKey = state.user.toLowerCase();
  const needsPred = [];
  const handled = [];
  todayMatches.forEach(m => {
    const myPred = (state.predictions[m.id]||{})[userKey];
    const hasResult = (state.results[m.id]||{}).entered;
    if (!myPred && !hasResult) needsPred.push(m);
    else handled.push(m);
  });

  // Sort each by kickoff time
  const byKickoff = (a,b) => {
    const ka = kickoffDate(a), kb = kickoffDate(b);
    if (ka && kb) return ka - kb;
    return a.id - b.id;
  };
  needsPred.sort(byKickoff);
  handled.sort(byKickoff);

  const header = `
    <div style="margin-bottom:12px">
      <div style="font-size:18px;font-weight:800">${dateLabel}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5)">${todayMatches.length} match${todayMatches.length===1?'':'es'} · ${needsPred.length} awaiting your pick</div>
    </div>`;

  let html = header;
  if (needsPred.length > 0) {
    html += `<div class="section-title" style="color:#f9c22e">⚡ Lock your picks</div>` + needsPred.map(renderCard).join("");
  }
  if (handled.length > 0) {
    html += `<div class="section-title">Locked & results</div>` + handled.map(renderCard).join("");
  }
  return html;
}

function renderCompleted(completed) {
  if (completed.length === 0) return '<div class="empty-state">No completed matches yet.</div>';

  // Confederations present in completed matches (always from full list)
  const confSet = new Set();
  completed.forEach(m => { confSet.add(confedOf(m.teamA)); confSet.add(confedOf(m.teamB)); });
  const confs = CONFED_LIST.filter(c => confSet.has(c));

  // Team dropdown narrows to the selected confederation (interdependent, one-directional)
  const teamSet = new Set();
  completed.forEach(m => {
    if (completedConfFilter) {
      // only list teams that belong to the chosen confederation
      if (confedOf(m.teamA) === completedConfFilter) teamSet.add(m.teamA);
      if (confedOf(m.teamB) === completedConfFilter) teamSet.add(m.teamB);
    } else {
      teamSet.add(m.teamA); teamSet.add(m.teamB);
    }
  });
  const teams = Array.from(teamSet).sort();

  // If the active team filter is no longer valid under the confederation, drop it
  if (completedFilter && !teams.includes(completedFilter)) completedFilter = "";

  // Apply filters
  let list = completed.slice();
  if (completedConfFilter) list = list.filter(m => confedOf(m.teamA) === completedConfFilter || confedOf(m.teamB) === completedConfFilter);
  if (completedFilter) list = list.filter(m => m.teamA === completedFilter || m.teamB === completedFilter);

  // Apply sort: "recent" = most recently played first (by date then id desc); "match" = match number asc
  if (completedSort === "recent") {
    list.sort((a, b) => {
      const da = matchDate(a), db = matchDate(b);
      if (da && db && da.getTime() !== db.getTime()) return db - da;
      return b.id - a.id;
    });
  } else {
    list.sort((a, b) => a.id - b.id);
  }

  const flagged = countFlagged();

  const controls = `
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <div style="flex:1;min-width:130px">
        <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Sort</div>
        <div style="display:flex;gap:4px">
          <button onclick="setCompletedSort('recent')" style="flex:1;height:32px;border-radius:6px;border:1px solid ${completedSort==='recent'?'#f9c22e':'rgba(255,255,255,0.12)'};background:${completedSort==='recent'?'rgba(249,194,46,0.13)':'rgba(255,255,255,0.04)'};color:${completedSort==='recent'?'#f9c22e':'rgba(255,255,255,0.5)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Latest</button>
          <button onclick="setCompletedSort('match')" style="flex:1;height:32px;border-radius:6px;border:1px solid ${completedSort==='match'?'#f9c22e':'rgba(255,255,255,0.12)'};background:${completedSort==='match'?'rgba(249,194,46,0.13)':'rgba(255,255,255,0.04)'};color:${completedSort==='match'?'#f9c22e':'rgba(255,255,255,0.5)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Match #</button>
        </div>
      </div>
      <div style="flex:1;min-width:130px">
        <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Filter by team</div>
        <select onchange="setCompletedFilter(this.value)" style="width:100%;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:#12213a;color:#fff;font-size:12px;font-family:inherit;padding:0 8px">
          <option value="">All teams</option>
          ${teams.map(t => `<option value="${esc(t)}" ${completedFilter===t?'selected':''}>${esc(t)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Filter by confederation</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button onclick="setCompletedConfFilter('')" style="height:30px;padding:0 11px;border-radius:6px;border:1px solid ${completedConfFilter===''?'#f9c22e':'rgba(255,255,255,0.12)'};background:${completedConfFilter===''?'rgba(249,194,46,0.13)':'rgba(255,255,255,0.04)'};color:${completedConfFilter===''?'#f9c22e':'rgba(255,255,255,0.5)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">All</button>
        ${confs.map(c => `<button onclick="setCompletedConfFilter('${c}')" style="height:30px;padding:0 11px;border-radius:6px;border:1px solid ${completedConfFilter===c?CONFED_COLORS[c]:'rgba(255,255,255,0.12)'};background:${completedConfFilter===c?CONFED_COLORS[c]+'22':'rgba(255,255,255,0.04)'};color:${completedConfFilter===c?CONFED_COLORS[c]:'rgba(255,255,255,0.5)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${CONFED_COLORS[c]};margin-right:5px"></span>${c}</button>`).join("")}
      </div>
    </div>
    ${flagged > 0 ? `<div style="background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#e74c3c;font-weight:600">⚠️ ${flagged} match(es) don't match the uploaded official data — scroll to find the red flags.</div>` : ""}
  `;

  const filterLabel = [completedFilter, completedConfFilter].filter(Boolean).join(" / ");
  if (list.length === 0) {
    return controls + `<div class="empty-state">No completed matches for ${esc(filterLabel || "this filter")}.</div>`;
  }

  // Group by stage, in canonical order
  const STAGE_ORDER = ["Group", "Round of 32", "Round of 16", "Quarter-Final", "Semi-Final", "Third Place", "Final"];
  const byStage = {};
  list.forEach(m => {
    const st = matchStage(m);
    (byStage[st] = byStage[st] || []).push(m);
  });
  // Order: when sorting "Latest", show latest stage first; else canonical order
  let stages = Object.keys(byStage).sort((a, b) => STAGE_ORDER.indexOf(a) - STAGE_ORDER.indexOf(b));
  if (completedSort === "recent") stages.reverse();

  const stageLabel = s => s === "Group" ? "Group Stage" : s;

  const sections = stages.map(st => {
    const matches = byStage[st];
    const collapsed = !!collapsedStages[st];
    // flag count within this stage
    const stageFlagged = matches.filter(m => { const v = validateMatch(m.id); return v && !v.ok; }).length;
    const header = `
      <button onclick="toggleStageCollapse('${st.replace(/'/g,"\\\\'")}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 13px;margin-bottom:${collapsed?'8px':'10px'};cursor:pointer;font-family:inherit">
        <span style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;color:rgba(255,255,255,0.5);transition:transform 0.15s;display:inline-block;transform:rotate(${collapsed?'-90deg':'0deg'})">▾</span>
          <span style="font-size:14px;font-weight:700;color:#fff">${esc(stageLabel(st))}</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.4)">${matches.length}</span>
          ${stageFlagged > 0 ? `<span style="background:#e74c3c;color:#fff;border-radius:8px;padding:0 6px;font-size:10px;font-weight:700">${stageFlagged}⚠️</span>` : ""}
        </span>
      </button>`;
    const body = collapsed ? "" : matches.map(renderCard).join("");
    return header + body;
  });

  return controls + sections.join("");
}

  const matchCards = built.matches.map(m => renderBracketTile(m, built));

// R32 match → which R16 match its winner advances to (FIFA 2026 bracket structure).
// Map: R32 matchNo -> { r16: matchNo, label }
// R32 → R16 pairing (which two R32 winners meet in the Round of 16).
// Pairs are by official bracket. Each pair shares an r16 match number (89-96).
// Verified from CBS: USA/Bosnia (81) winner meets Belgium/Senegal (82) winner.
// Pairs follow the bracket order; matchNos grouped two-by-two into R16.
// Official R16 structure (NBC/FIFA). Each R16 match fed by two R32 match winners.
// matchNo 89-96, with dates/times/venues.
const R16_STRUCTURE = [
  { id:201, matchNo:89, date:"Jul 4", time:"5:00 PM",  venue:"Philadelphia",  feeds:[74,77] },  // Germany/Paraguay W vs France/Sweden W  (Paraguay vs France)
  { id:202, matchNo:90, date:"Jul 4", time:"1:00 PM",  venue:"Houston",       feeds:[73,75] },  // SA/Canada W vs Netherlands/Morocco W    (Canada vs Morocco)
  { id:203, matchNo:91, date:"Jul 5", time:"4:00 PM",  venue:"New York/NJ",   feeds:[76,78] },  // Brazil/Japan W vs Ivory Coast/Norway W  (Brazil vs Norway)
  { id:204, matchNo:92, date:"Jul 5", time:"8:00 PM",  venue:"Mexico City",   feeds:[79,80] },  // Mexico/Ecuador W vs England/DR Congo W   (Mexico vs England)
  { id:205, matchNo:93, date:"Jul 6", time:"3:00 PM",  venue:"Dallas",        feeds:[83,84] },  // Portugal/Croatia W vs Spain/Austria W
  { id:206, matchNo:94, date:"Jul 6", time:"8:00 PM",  venue:"Seattle",       feeds:[81,82] },  // USA/Bosnia W vs Belgium/Senegal W
  { id:207, matchNo:95, date:"Jul 7", time:"12:00 PM", venue:"Atlanta",       feeds:[86,88] },  // Egypt/Australia W vs Colombia/Ghana W
  { id:208, matchNo:96, date:"Jul 7", time:"4:00 PM",  venue:"Vancouver",     feeds:[85,87] },  // Switzerland/Iran W vs Argentina/CapeVerde W
];

// R32 → R16 mapping derived from R16_STRUCTURE (authoritative).
const R32_TO_R16 = {
  74:{r16:89}, 77:{r16:89},
  73:{r16:90}, 75:{r16:90},
  76:{r16:91}, 78:{r16:91},
  79:{r16:92}, 80:{r16:92},
  83:{r16:93}, 84:{r16:93},
  81:{r16:94}, 82:{r16:94},
  86:{r16:95}, 88:{r16:95},
  85:{r16:96}, 87:{r16:96},
};

// Who else could the winner face? Find the other R32 match feeding the same R16 slot.
function pathForward(m, built) {
  const link = R32_TO_R16[m.matchNo];
  if (!link) return null;
  // find sibling R32 matches feeding the same R16 match
  const siblings = Object.keys(R32_TO_R16)
    .filter(k => R32_TO_R16[k].r16 === link.r16 && Number(k) !== m.matchNo)
    .map(k => built.matches.find(x => x.matchNo === Number(k)))
    .filter(Boolean);
  return { r16: link.r16, siblings };
}

// Compact, view-only bracket tile
function renderBracketTile(m, built) {
  const result = state.results[m.id];
  const hasResult = result && result.entered;
  const resolved = m.teamAResolved && m.teamBResolved;

  // Determine winner styling if result entered
  let aWin = false, bWin = false;
  if (hasResult && result.draw !== "Y") {
    aWin = result.winner === "A";
    bWin = result.winner === "B";
  }

  const teamRow = (name, score, isWin, resolvedSide) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;${isWin?'':''}">
      <span style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:${isWin?'800':'500'};color:${isWin?'#2ecc71':(resolvedSide?'#fff':'rgba(255,255,255,0.45)')}">
        ${resolvedSide ? flag(name) : '<span style="font-size:24px">⚽</span>'}
        ${esc(name)}
        ${isWin?' <span style="font-size:10px">✓</span>':''}
      </span>
      ${hasResult ? `<span style="font-size:16px;font-weight:800;color:${isWin?'#2ecc71':'#fff'}">${esc(score)}</span>` : ""}
    </div>`;

  // Path forward
  const path = pathForward(m, built);
  let pathHtml = "";
  if (path && path.siblings.length > 0) {
    const sib = path.siblings[0];
    const opp = (sib.teamAResolved && sib.teamBResolved)
      ? `${esc(sib.teamA)} / ${esc(sib.teamB)}`
      : "winner of #" + sib.matchNo;
    pathHtml = `<div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)">↗ Winner advances to R16 #${path.r16} — faces ${opp}</div>`;
  }

  return `
    <div class="card" style="${hasResult?'':'opacity:'+(resolved?'1':'0.65')}">
      <div class="card-header">
        <span class="match-meta">#${m.matchNo} · ${esc(m.date)} · ${esc(m.time)} ET · ${esc(m.venue)}</span>
        <span class="group-badge" style="background:#34495e">R32</span>
      </div>
      <div style="padding:10px 14px">
        ${teamRow(m.teamA, hasResult?result.scoreA:"", aWin, m.teamAResolved)}
        <div style="height:1px;background:rgba(255,255,255,0.06)"></div>
        ${teamRow(m.teamB, hasResult?result.scoreB:"", bWin, m.teamBResolved)}
        ${!resolved ? `<div style="font-size:10px;color:rgba(243,156,18,0.8);margin-top:6px">${m.teamAResolved||m.teamBResolved?'Awaiting other team':'Teams TBD'}</div>` : ""}
        ${pathHtml}
      </div>
    </div>`;
}

// ── Analytics ─────────────────────────────────────────────────────────────────
function computeStats() {
  const players = { luis: emptyPlayerStats(), bibi: emptyPlayerStats() };
  let rowWins = { luis: 0, bibi: 0, tie: 0 };
  let totalGoalsActual = 0, scoredMatches = 0;
  let biggestSwing = { diff: 0, match: null, winner: null };

  // Process matches in chronological order for streaks + cumulative timeline
  const ordered = allMatches().filter(m => (state.results[m.id]||{}).entered)
    .sort((a, b) => {
      const da = matchDate(a), db = matchDate(b);
      if (da && db && da.getTime() !== db.getTime()) return da - db;
      return a.id - b.id;
    });

  let cumL = 0, cumB = 0;
  const timeline = []; // { label, luis, bibi } cumulative after each scored match
  let curStreak = { who: null, len: 0 };
  let bestStreak = { luis: 0, bibi: 0 };

  ordered.forEach(m => {
    const result = state.results[m.id];
    const pred = state.predictions[m.id] || {};
    const pts = {};
    const mult = stageMultiplier(matchStage(m));

    ["luis","bibi"].forEach(k => {
      const p = pred[k];
      const s = players[k];
      if (!p || !p.locked) return;
      s.predicted++;
      let matchPts = 0;

      const hitA = String(p.scoreA) === String(result.scoreA);
      const hitB = String(p.scoreB) === String(result.scoreB);
      if (hitA) { s.cat.exactA += SCORING.scoreA; s.hits.exactA++; matchPts += SCORING.scoreA; }
      if (hitB) { s.cat.exactB += SCORING.scoreB; s.hits.exactB++; matchPts += SCORING.scoreB; }
      if (hitA && hitB) s.perfectScores++;

      if (result.draw === "Y") {
        if (p.draw === "Y") { s.cat.draw += SCORING.draw; s.hits.draw++; matchPts += SCORING.draw; }
        s.drawGames++;
      } else {
        const predWinner = Number(p.scoreA) > Number(p.scoreB) ? "A" : "B";
        if (predWinner === result.winner) { s.cat.winner += SCORING.winner; s.hits.winner++; matchPts += SCORING.winner; }
        s.decisiveGames++;
      }

      if (p.penalty === result.penalty) { s.cat.penalty += SCORING.penalty; s.hits.penalty++; matchPts += SCORING.penalty; }

      if (p.redCard !== undefined && p.redCard !== "" && result.redCard !== undefined && result.redCard !== "") {
        s.redCardEligible++;
        if (p.redCard === result.redCard) { s.cat.redCard += (SCORING.redCard || 0); s.hits.redCard++; matchPts += (SCORING.redCard || 0); }
      }

      // ── Weighted category contribution (for gap attribution) ──
      if (hitA) s.wcat.exact += SCORING.scoreA * mult;
      if (hitB) s.wcat.exact += SCORING.scoreB * mult;
      if (result.draw === "Y") { if (p.draw === "Y") s.wcat.draw += SCORING.draw * mult; }
      else { const pw = Number(p.scoreA) > Number(p.scoreB) ? "A" : "B"; if (pw === result.winner) s.wcat.winner += SCORING.winner * mult; }
      if (p.penalty === result.penalty) s.wcat.penalty += SCORING.penalty * mult;
      if (p.redCard !== undefined && p.redCard !== "" && result.redCard !== undefined && result.redCard !== "" && p.redCard === result.redCard) s.wcat.redCard += (SCORING.redCard || 0) * mult;

      // ── Confederation lean & accuracy ──
      // m.teamA and m.teamB each belong to a confederation. Attribute predicted goals to each.
      const confA = confedOf(m.teamA), confB = confedOf(m.teamB);
      const cA = ensureConfed(s, confA), cB = ensureConfed(s, confB);
      const paG = Number(p.scoreA), pbG = Number(p.scoreB);
      if (!isNaN(paG)) { cA.goalsPredicted += paG; cA.exactGoalAttempts++; if (String(p.scoreA) === String(result.scoreA)) cA.exactGoalHits++; }
      if (!isNaN(pbG)) { cB.goalsPredicted += pbG; cB.exactGoalAttempts++; if (String(p.scoreB) === String(result.scoreB)) cB.exactGoalHits++; }
      // Win pick: which team did they predict to win? (skip if they predicted a draw)
      if (!isNaN(paG) && !isNaN(pbG) && paG !== pbG) {
        const pickedConf = paG > pbG ? confA : confB;
        const pc = ensureConfed(s, pickedConf);
        pc.winsPicked++;
        pc.winPicksTotal++;
        // correct if that team actually won
        const actualWinnerConf = result.draw === "Y" ? null : (result.winner === "A" ? confA : confB);
        if (actualWinnerConf === pickedConf) pc.winPicksCorrect++;
      }

      // ── Fingerprint: predicted goals, scorelines, draw tendency ──
      const pa = Number(p.scoreA), pb = Number(p.scoreB);
      if (!isNaN(pa) && !isNaN(pb)) {
        s.fp.totalGoalsPredicted += pa + pb;
        s.fp.scorelineCount[pa + "-" + pb] = (s.fp.scorelineCount[pa + "-" + pb] || 0) + 1;
        if (pa === pb) s.fp.drawsPredicted++;
        // Closeness: how far off the aggregate scoreline was
        const sa = Number(result.scoreA), sb = Number(result.scoreB);
        s.close.totalGoalDiffError += Math.abs((pa - pb) - (sa - sb));
        s.close.totalGoalError += Math.abs(pa - sa) + Math.abs(pb - sb);
        s.close.n++;
      }
      // Calibration: when they said "Y" for penalty/red/draw, how often right
      if (p.penalty === "Y") { s.cal.penYesPredicted++; if (result.penalty === "Y") s.cal.penYesCorrect++; }
      if (p.redCard === "Y") { s.cal.redYesPredicted++; if (result.redCard === "Y") s.cal.redYesCorrect++; }

      let weighted = matchPts * mult;
      if (p.late) weighted = weighted * ((LATE.latePercent ?? 50) / 100);
      if (p.late) s.lateBets = (s.lateBets || 0) + 1;
      s.total += weighted;
      if (weighted > s.bestMatch.pts) s.bestMatch = { pts: weighted, match: m };
      if (matchPts === 0) s.blanks++;
      pts[k] = weighted;
    });

    if (pts.luis !== undefined && pts.bibi !== undefined) {
      scoredMatches++;
      if (pts.luis > pts.bibi) rowWins.luis++;
      else if (pts.bibi > pts.luis) rowWins.bibi++;
      else rowWins.tie++;
      const diff = Math.abs(pts.luis - pts.bibi);
      if (diff > biggestSwing.diff) biggestSwing = { diff, match: m, winner: pts.luis > pts.bibi ? "Luis" : "Bibi" };

      // Streak tracking (who won this head-to-head match)
      const winner = pts.luis > pts.bibi ? "luis" : (pts.bibi > pts.luis ? "bibi" : null);
      if (winner) {
        if (curStreak.who === winner) curStreak.len++;
        else curStreak = { who: winner, len: 1 };
        if (curStreak.len > bestStreak[winner]) bestStreak[winner] = curStreak.len;
      } else {
        curStreak = { who: null, len: 0 };
      }

      // Cumulative timeline point
      cumL += pts.luis; cumB += pts.bibi;
      timeline.push({ label: m.date || ("#"+m.id), luis: cumL, bibi: cumB });
    }
    totalGoalsActual += Number(result.scoreA) + Number(result.scoreB);
  });

  // ── Magic number inputs ──
  // Remaining matches = matches NOT yet scored. Max points still available per player
  // depends on whether they can still predict (group matches are pre-known; knockouts appear later).
  const maxPerGame = SCORING.scoreA + SCORING.scoreB + SCORING.winner + SCORING.draw + SCORING.penalty + (SCORING.redCard || 0);
  let remainingMaxLuis = 0, remainingMaxBibi = 0, remainingCount = 0;
  allMatches().forEach(m => {
    if ((state.results[m.id]||{}).entered) return;
    remainingCount++;
    const mult = stageMultiplier(matchStage(m));
    // Both players can still earn up to maxPerGame * mult on each unplayed match
    remainingMaxLuis += maxPerGame * mult;
    remainingMaxBibi += maxPerGame * mult;
  });

  return { players, rowWins, scoredMatches, totalGoalsActual, biggestSwing, timeline, bestStreak, curStreak,
    remainingCount, remainingMaxLuis, remainingMaxBibi, maxPerGame };
}

function emptyPlayerStats() {
  return {
    predicted: 0, total: 0, perfectScores: 0, blanks: 0,
    drawGames: 0, decisiveGames: 0,
    cat: { exactA: 0, exactB: 0, winner: 0, draw: 0, penalty: 0, redCard: 0 },
    hits: { exactA: 0, exactB: 0, winner: 0, draw: 0, penalty: 0, redCard: 0 },
    redCardEligible: 0,
    bestMatch: { pts: -1, match: null },
    fp: { totalGoalsPredicted: 0, drawsPredicted: 0, scorelineCount: {} },
    cal: { penYesPredicted: 0, penYesCorrect: 0, redYesPredicted: 0, redYesCorrect: 0 },
    close: { totalGoalDiffError: 0, totalGoalError: 0, n: 0 },
    wcat: { exact: 0, winner: 0, draw: 0, penalty: 0, redCard: 0 }, // WEIGHTED category points
    confed: {}, // per-confederation: { goalsPredicted, winsPicked, winPicksCorrect, winPicksTotal, exactGoalHits, exactGoalAttempts }
  };
}

function ensureConfed(s, c) {
  if (!s.confed[c]) s.confed[c] = { goalsPredicted: 0, winsPicked: 0, winPicksCorrect: 0, winPicksTotal: 0, exactGoalHits: 0, exactGoalAttempts: 0 };
  return s.confed[c];
}

function statBar(label, luisVal, bibiVal, maxVal) {
  const lw = maxVal > 0 ? (luisVal / maxVal) * 100 : 0;
  const bw = maxVal > 0 ? (bibiVal / maxVal) * 100 : 0;
  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
        <span style="font-weight:600;color:rgba(255,255,255,0.7)">${label}</span>
        <span style="color:rgba(255,255,255,0.45)">L: <strong style="color:#5dade2">${luisVal}</strong> · B: <strong style="color:#bb8fce">${bibiVal}</strong></span>

      <div style="display:flex;flex-direction:column;gap:3px">

function accRow(label, lHits, lTotal, bHits, bTotal) {

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px">
      <span style="color:rgba(255,255,255,0.65)">${label}</span>
      <span>

        <strong style="color:#bb8fce">${bPct}%</strong> <span style="font-size:10px;color:rgba(255,255,255,0.3)">(${bHits}/${bTotal})</span>

}

function fpRow(label, lSum, lN, bSum, bN, decimals, raw) {
  const lv = raw ? lSum : (lN > 0 ? (lSum / lN).toFixed(decimals) : "—");
  const bv = raw ? bSum : (bN > 0 ? (bSum / bN).toFixed(decimals) : "—");
  return `
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span style="color:rgba(255,255,255,0.65)">${label}</span>
      <span><strong style="color:#5dade2">${lv}</strong> · <strong style="color:#bb8fce">${bv}</strong></span>
    </div>`;
}

function topScoreline(counts) {
  const keys = Object.keys(counts);
  if (keys.length === 0) return "—";
  keys.sort((a, b) => counts[b] - counts[a]);
  return keys[0] + " (×" + counts[keys[0]] + ")";
}

function avgClose(sum, n) {
  return n > 0 ? (sum / n).toFixed(1) : "—";
}

// Confederation lean: goals predicted + win-pick share + win-pick accuracy per confederation
function renderConfederationAnalysis(L, B) {
  // Only show confederations that appear in either player's data
  const confs = CONFED_LIST.filter(c => (L.confed[c] || B.confed[c]));
  if (confs.length === 0) {
    return '<div class="standings-card" style="text-align:center;color:rgba(255,255,255,0.35);font-size:13px">No predictions yet to analyze.</div>';
  }

  const lTotalGoals = CONFED_LIST.reduce((s,c) => s + (L.confed[c]?.goalsPredicted||0), 0) || 1;
  const bTotalGoals = CONFED_LIST.reduce((s,c) => s + (B.confed[c]?.goalsPredicted||0), 0) || 1;
  const lTotalWins = CONFED_LIST.reduce((s,c) => s + (L.confed[c]?.winsPicked||0), 0) || 1;
  const bTotalWins = CONFED_LIST.reduce((s,c) => s + (B.confed[c]?.winsPicked||0), 0) || 1;

  const rows = confs.map(c => {
    const lc = L.confed[c] || {}, bc = B.confed[c] || {};
    const lGoalShare = Math.round(((lc.goalsPredicted||0) / lTotalGoals) * 100);
    const bGoalShare = Math.round(((bc.goalsPredicted||0) / bTotalGoals) * 100);
    const lWinShare = Math.round(((lc.winsPicked||0) / lTotalWins) * 100);
    const bWinShare = Math.round(((bc.winsPicked||0) / bTotalWins) * 100);
    const lWinAcc = lc.winPicksTotal > 0 ? Math.round((lc.winPicksCorrect/lc.winPicksTotal)*100) : null;
    const bWinAcc = bc.winPicksTotal > 0 ? Math.round((bc.winPicksCorrect/bc.winPicksTotal)*100) : null;
    return `
      <div style="padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <span style="width:11px;height:11px;border-radius:3px;background:${CONFED_COLORS[c]||'#777'};display:inline-block"></span>
          <span style="font-size:13px;font-weight:700;color:#fff">${c}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:11px">
          <div style="color:rgba(255,255,255,0.5)">Goals predicted</div>
          <div style="text-align:right"><strong style="color:#5dade2">${lc.goalsPredicted||0}</strong> <span style="color:rgba(255,255,255,0.3)">(${lGoalShare}%)</span> · <strong style="color:#bb8fce">${bc.goalsPredicted||0}</strong> <span style="color:rgba(255,255,255,0.3)">(${bGoalShare}%)</span></div>
          <div style="color:rgba(255,255,255,0.5)">Picked to win</div>
          <div style="text-align:right"><strong style="color:#5dade2">${lc.winsPicked||0}</strong> <span style="color:rgba(255,255,255,0.3)">(${lWinShare}%)</span> · <strong style="color:#bb8fce">${bc.winsPicked||0}</strong> <span style="color:rgba(255,255,255,0.3)">(${bWinShare}%)</span></div>
          <div style="color:rgba(255,255,255,0.5)">Win-pick accuracy</div>
          <div style="text-align:right"><strong style="color:#5dade2">${lWinAcc===null?'—':lWinAcc+'%'}</strong> · <strong style="color:#bb8fce">${bWinAcc===null?'—':bWinAcc+'%'}</strong></div>
        </div>
      </div>`;
  }).join("");

  // Spotlight: each player's most-favored confederation by goals
  const favOf = (player) => {
    let best = null, bestG = -1;
    CONFED_LIST.forEach(c => { const g = player.confed[c]?.goalsPredicted||0; if (g > bestG) { bestG = g; best = c; } });
    return best;
  };
  const lFav = favOf(L), bFav = favOf(B);

  return `
    <div class="standings-card">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:10px;line-height:1.5">
        How your predictions lean by confederation. <strong style="color:#5dade2">Luis</strong> · <strong style="color:#bb8fce">Bibi</strong>. Share = % of your total across all confederations.
      </div>
      ${rows}
      <div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6">
        🎯 Most-backed: Luis leans <strong style="color:${CONFED_COLORS[lFav]||'#fff'}">${lFav||'—'}</strong>, Bibi leans <strong style="color:${CONFED_COLORS[bFav]||'#fff'}">${bFav||'—'}</strong>.
      </div>
    </div>`;
}

// Inline SVG cumulative line chart: Luis (blue) vs Bibi (purple) over scored matches
function renderTimelineChart(timeline) {
  if (!timeline || timeline.length < 2) {
    return '<div style="text-align:center;color:rgba(255,255,255,0.35);font-size:13px;padding:12px">Need at least 2 scored matches to chart the lead.</div>';
  }
  const W = 300, H = 140, padL = 8, padR = 8, padT = 10, padB = 18;
  const n = timeline.length;
  const allVals = timeline.flatMap(p => [p.luis, p.bibi]);
  const maxV = Math.max(...allVals, 1);
  let minV = Math.min(...allVals, 0);
  const range = maxV - minV || 1;
  minV = Math.max(0, minV - range * 0.08);
  const top = maxV + range * 0.08;
  const x = i => padL + (n === 1 ? 0.5 : (i / (n - 1))) * (W - padL - padR);
  const y = v => padT + (1 - (v - minV) / (top - minV)) * (H - padT - padB);
  const path = (key, color) => {
    const d = timeline.map((p, i) => (i === 0 ? "M" : "L") + x(i).toFixed(1) + " " + y(p[key]).toFixed(1)).join(" ");
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>`;
  };
  const lastL = timeline[n-1].luis, lastB = timeline[n-1].bibi;
  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      ${path("luis", "#3498db")}
      ${path("bibi", "#9b59b6")}
      <circle cx="${x(n-1)}" cy="${y(lastL)}" r="3" fill="#3498db"/>
      <circle cx="${x(n-1)}" cy="${y(lastB)}" r="3" fill="#9b59b6"/>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px">
      <span>${esc(timeline[0].label)}</span>
      <span>${esc(timeline[n-1].label)}</span>
    </div>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px">
      <span style="color:#5dade2;font-weight:700">● Luis ${lastL}</span>
      <span style="color:#bb8fce;font-weight:700">● Bibi ${lastB}</span>
    </div>`;
}

function renderSettings() {
  const maxPts = SCORING.scoreA + SCORING.scoreB + SCORING.winner + SCORING.draw + SCORING.penalty + (SCORING.redCard || 0);
  const row = (label, group, field, value, note) => `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
      <div>
        <div style="font-size:13px;font-weight:600">${label}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px">${note}</div>
      </div>
      <input type="number" inputmode="numeric" min="0" value="${value}"
        style="width:72px;height:42px;border-radius:8px;border:1.5px solid rgba(249,194,46,0.35);background:rgba(249,194,46,0.07);color:#f9c22e;font-size:18px;font-weight:700;text-align:center;outline:none;font-family:inherit"
        onchange="updateSetting('${group}','${field}',this.value)">
    </div>`;

  return `
    <div class="section-title">Scoring Settings</div>
    <div class="standings-card">
      ${row("Exact Score — Team A", "scoring", "scoreA", SCORING.scoreA, "Points for predicting Team A's exact goals")}
      ${row("Exact Score — Team B", "scoring", "scoreB", SCORING.scoreB, "Points for predicting Team B's exact goals")}
      ${row("Correct Winner", "scoring", "winner", SCORING.winner, "Points for predicting the winning team")}
      ${row("Correct Draw (group)", "scoring", "draw", SCORING.draw, "Group stage: points for correctly predicting a draw")}
      ${row("Overtime (knockouts)", "scoring", "overtime", SCORING.overtime ?? 5, "Knockouts: points for predicting if it goes past 90 min")}
      ${row("Penalty / Shootout", "scoring", "penalty", SCORING.penalty, "Penalty kick in play, or (knockouts) a shootout")}
      ${row("Red Card", "scoring", "redCard", SCORING.redCard ?? 5, "Points for predicting whether a red card was shown")}
      <div style="display:flex;justify-content:space-between;padding:12px 0 2px;font-size:13px">
        <span style="color:rgba(255,255,255,0.5);font-weight:600">Max points per game</span>
        <span style="color:#2ecc71;font-weight:800;font-size:16px">${maxPts}</span>
      </div>
    </div>
    <div class="section-title">Stage Multipliers</div>
    <div class="standings-card">
      ${["Round of 32","Round of 16","Quarter-Final","Semi-Final","Third Place","Final"].map(stage =>
        `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:13px;font-weight:600">${stage}</div>
          <input type="number" inputmode="decimal" min="0" step="0.5" value="${MULTIPLIERS[stage] ?? 2}"
            style="width:72px;height:42px;border-radius:8px;border:1.5px solid rgba(52,152,219,0.4);background:rgba(52,152,219,0.07);color:#5dade2;font-size:18px;font-weight:700;text-align:center;outline:none;font-family:inherit"
            onchange="updateMultiplier('${stage}',this.value)">
        </div>`).join("")}
      <div style="font-size:11px;color:rgba(255,255,255,0.4);padding-top:12px;line-height:1.5">
        Group stage is always 1×. Knockout points = base category points × this multiplier. (Locked-in plan: R32–Semi at 2×; 3rd-place & Final default 2×, decide later.)
      </div>
    </div>
    <div class="section-title">Late Bets ⏰</div>
    <div class="standings-card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0">
        <div>
          <div style="font-size:13px;font-weight:600">Late bet scores</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px">% of normal points if locked after kickoff</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" inputmode="numeric" min="0" max="100" value="${LATE.latePercent ?? 50}"
            style="width:62px;height:42px;border-radius:8px;border:1.5px solid rgba(230,126,34,0.4);background:rgba(230,126,34,0.07);color:#e67e22;font-size:18px;font-weight:700;text-align:center;outline:none;font-family:inherit"
            onchange="updateLate(this.value)">
          <span style="color:#e67e22;font-weight:700">%</span>
        </div>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);padding-top:6px;line-height:1.5">
        A bet locked after kickoff is tagged ⏰ Late and scores this %. Once a result is entered, predictions close entirely.
      </div>
    </div>
    <div class="section-title">Payout</div>
    <div class="standings-card">
      ${row("Points per unit", "payout", "ptsPerUnit", PAYOUT.ptsPerUnit, "How many points make one payout unit")}
      ${row("Dollars per unit ($)", "payout", "dollarsPerUnit", PAYOUT.dollarsPerUnit, "Dollar value of each unit")}
      <div style="font-size:12px;color:rgba(255,255,255,0.45);padding-top:12px">
        Current rate: every <strong style="color:#f9c22e">${PAYOUT.ptsPerUnit} pts</strong> difference = <strong style="color:#f9c22e">$${PAYOUT.dollarsPerUnit}</strong>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button onclick="resetSettings()" style="background:none;border:1px solid rgba(231,76,60,0.4);color:#e74c3c;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Reset to defaults</button>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:16px;line-height:1.6;padding:0 12px">
      ⚠️ Changing point values re-scores ALL matches, including completed ones — and syncs to both phones instantly.
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadLocalCache();
refreshKnockout();
render();
startFirestoreSync();
</script>
</body>
</html>
